; fpm-pool.conf
; This file overrides default PHP-FPM pool settings.

[www]
user = www-data
group = www-data

listen = 9000

; We'll use dynamic process management
pm = dynamic
pm.max_children = 10        ; Up to 10 PHP-FPM processes
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500       ; how many requests before a child is respawned

; Log settings
access.log = /proc/self/fd/2
catch_workers_output = yes

